server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the server container
    location /aggregator/api/ {
        proxy_pass         http://server:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy BullBoard queue dashboard
    location /aggregator/admin/queues/ {
        proxy_pass         http://server:3001/admin/queues/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # React SPA — serve under /aggregator subpath (files in /usr/share/nginx/html/aggregator/)
    location /aggregator {
        try_files $uri $uri/ /aggregator/index.html;
    }
}
